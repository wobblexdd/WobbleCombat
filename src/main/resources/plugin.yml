name: WobbleCombat
version: '1.0.0'
main: com.wobble.wobblecombat.WobbleCombatPlugin
api-version: '1.21'
authors: [Wobble]
description: Combat tag plugin inspired by Donut-style servers.
website: https://github.com/mororpm
loadbefore: [EmeraldAura]
softdepend: [PlaceholderAPI]
commands:
  wobblecombat:
    description: Main command for WobbleCombat.
    usage: /<command> reload | status [player] | history [player] | debug [player] | clear <player> | savehistory | forcetag <attacker> <victim>
    aliases: [wc, combatreload]
permissions:
  wobblecombat.reload:
    description: Allows reloading WobbleCombat.
    default: op
  donutcombat.reload:
    description: Legacy compatibility permission alias.
    default: op
  wobblecombat.status:
    description: Allows viewing combat status.
    default: op
  wobblecombat.admin:
    description: Allows admin combat control commands.
    default: op
  wobblecombat.debug:
    description: Allows viewing internal combat debug data.
    default: op
  wobblecombat.bypass:
    description: Bypass combat tag and command restrictions.
    default: false
  wobblecombat.notify:
    description: Allows receiving combat-log staff notifications.
    default: op
